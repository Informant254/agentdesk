[build]
  base = "frontend"
  command = "npm install && npm run build"

[build.environment]
  NODE_VERSION = "18"

[[plugins]]
  package = "@netlify/plugin-nextjs"

  [plugins.inputs]
    version = "^5.0.0"

[[redirects]]
  from = "/api/*"
  to = "https://agentdesk-api.onrender.com/api/:splat"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
