name: Keep Render Backend Warm

on:
  schedule:
    # Every 10 minutes — Render's free tier spins down after 15 min idle
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 120 https://agentdesk-mzx6.onrender.com/api/health)
          echo "Health check status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "::warning::Health check returned $STATUS"
          fi
